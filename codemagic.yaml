workflows:
  flutter-build:
    name: Flutter Build
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Clean workspace
        script: |
          rm -rf android ios build

      - name: Create Flutter project structure
        script: |
          flutter create .

      - name: Get dependencies
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
