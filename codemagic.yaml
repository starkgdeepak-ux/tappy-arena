 workflows:
  flutter-build:
    name: Flutter Build
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Create Android project
        script: |
          flutter create --platforms=android .

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
