workflows:
  flutter-build:
    name: Flutter Build
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Generate Flutter project
        script: |
          flutter create .
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
