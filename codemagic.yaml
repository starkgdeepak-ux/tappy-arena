workflows:
  android-build:
    name: Android Build (Manual Flutter Init)

    environment:
      flutter: stable

    scripts:
      - name: Setup fresh Flutter project
        script: |
          rm -rf *
          flutter create myapp
          cd myapp

      - name: Replace lib code
        script: |
          rm -rf lib
          mkdir lib
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return const MaterialApp(
                home: Scaffold(
                  body: Center(
                    child: Text("Tappy Arena 🚀"),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Get dependencies
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --debug

    artifacts:
      - myapp/build/app/outputs/flutter-apk/app-debug.apk
